  <!DOCTYPE html>
<html>
<head>
    <title>Zayn K. Cage - IT & Cybersecurity Professional</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* Winter Night Gradient - Fixed background */
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            background-attachment: fixed;
            color: #ffeb3b;
            text-align: center;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            transition: background 0.2s ease;
            scroll-behavior: smooth;
        }

        /* Red Pulse Class triggered by snow hitting the bottom */
        body.pulse-red {
            background: radial-gradient(ellipse at bottom, #4a0000 0%, #090A0F 100%);
        }

        /* Snow Animation Styling */
        .snowflake {
            position: fixed;
            top: -20px;
            color: white;
            user-select: none;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* --- SETTING SUN (Left Side) --- */
        .sun {
            position: fixed;
            top: 20px; 
            left: 20px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff176 20%, #ffeb3b 60%, #fbc02d 80%);
            border-radius: 50%;
            box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffeb3b;
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 9998;
            pointer-events: none;
            transition: transform 0.1s linear, opacity 0.1s linear;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffeb3b; }
            50% { transform: scale(1.05); box-shadow: 0 0 50px #fff176, 0 0 100px #fff176; }
        }

        /* --- PHASE SHIFTING MOON (Right Side) --- */
        .moon-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            z-index: 9998;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .moon {
            width: 90px;
            height: 90px;
            background-color: #f5f5f5;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset -10px -10px 15px rgba(0,0,0,0.2), 0 0 20px rgba(200, 220, 255, 0.4);
        }

        #moon-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #090A0F;
            border-radius: 50%;
            transition: left 0.1s ease-out;
        }

        .moon-orbital-glow {
            position: absolute;
            width: 130px;
            height: 130px;
            background: conic-gradient(from 0deg, rgba(200, 220, 255, 0.2) 0%, transparent 40%, rgba(200, 220, 255, 0.2) 100%);
            border-radius: 50%;
            animation: moonOrbitSpin 15s linear infinite;
            filter: blur(5px);
            z-index: -1;
        }

        @keyframes moonOrbitSpin {
            to { transform: rotate(360deg); }
        }

        /* Navigation Bar */
        nav {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 2px solid #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b;
            position: sticky;
            top: 0;
            z-index: 10000;
        }

        nav a {
            color: #ffeb3b;
            margin: 0 20px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #fff176;
            text-shadow: 0 0 10px #fff176;
        }

        /* Liquid Glass Header */
        .header {
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 5px;
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 2px 2px 15px rgba(0,0,0,0.8);
            z-index: 3;
        }

        /* Frosted Ice Boxes */
        .box {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            padding: 25px;
            margin: 35px auto;
            width: 65%;
            border-radius: 12px;
            position: relative;
            color: #ffeb3b;
            z-index: 5;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2), 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .glitch-text:hover {
            display: inline-block;
            animation: frostGlitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: #fff;
            text-shadow: 2px 0 #00ffff, -2px 0 #ffeb3b;
            cursor: pointer;
        }

        @keyframes frostGlitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            60% { transform: translate(2px, -2px); }
        }

        /* GIF Container */
        .gif-container {
            margin: 40px auto;
            max-width: 400px;
            position: relative;
            z-index: 5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px #ffeb3b;
        }

        /* Blood Splatter Footer */
        .blood-footer {
            position: relative;
            width: 100%;
            height: 160px;
            background: #ffffff;
            border-top: 3px solid #ff0000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            margin-top: 50px;
        }

        .splatter {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #d40000;
            border-radius: 50%;
            animation: splatterFly 2.2s infinite ease-out;
        }

        .drop1 { left: 15%; top: 40px; animation-delay: 0s; }
        .drop2 { left: 45%; top: 55px; animation-delay: 0.4s; }
        .drop3 { left: 75%; top: 35px; animation-delay: 0.8s; }

        @keyframes splatterFly {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(50px, 100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="sun" id="setting-sun"></div>

    <div class="moon-container">
        <div class="moon-orbital-glow"></div>
        <div class="moon">
            <div id="moon-shadow"></div>
        </div>
    </div>

        <a href="#passed-exams">Passed Exams</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
