<!DOCTYPE html>
<html>
<head>
    <title>Zayn K. Cage - IT & Cybersecurity Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            background-attachment: fixed;
            color: #ffeb3b;
            text-align: center;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            transition: background 0.2s ease;
            scroll-behavior: smooth;
        }

        /* --- OLD SCHOOL FIGHTING GAME INTRO --- */
        #game-intro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .intro-text {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 4px 4px #d40000;
            letter-spacing: 2px;
        }

        /* --- DIO WALKING ANIMATION --- */
        #dio-container {
            width: 140px; 
            margin-bottom: 10px; 
            border: 2px solid #ffeb3b; 
            border-radius: 8px; 
            overflow: hidden;
            transition: opacity 0.3s ease;
            position: relative;
            /* Animation: Moves from left off-screen to center */
            animation: dioWalk 3s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
        }

        @keyframes dioWalk {
            0% { transform: translateX(-150vw); }
            100% { transform: translateX(0); }
        }

        /* --- CREDLY BADGE SLOT MACHINE --- */
        #slot-machine {
            width: 340px;
            height: 130px;
            border: 6px solid #ffeb3b;
            background: #111;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            box-shadow: 0 0 25px #ffeb3b, inset 0 0 15px #000;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }

        .reel {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 2px solid #444;
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            animation: spinReel 1.5s linear infinite;
        }

        .reel-inner img {
            width: 80px;
            height: 80px;
            margin: 5px auto;
            display: block;
        }

        @keyframes spinReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-270px); }
        }

        .insert-coin {
            font-family: 'Press Start 2P', cursive;
            color: #ffeb3b;
            font-size: 18px;
            cursor: pointer;
            padding: 15px;
            border: 4px double #ffeb3b;
            animation: blink 0.6s infinite;
            margin-top: 20px;
            background: transparent;
        }

        /* --- GLITCH EFFECT --- */
        .glitch-out {
            animation: glitch 0.2s infinite !important; /* Override walk animation */
            filter: hue-rotate(90deg) contrast(150%);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); clip-path: inset(10% 0 30% 0); }
            40% { transform: translate(5px, -5px); clip-path: inset(40% 0 10% 0); }
            60% { transform: translate(-10px, 2px); opacity: 0.8; }
            80% { transform: translate(10px, -2px); clip-path: inset(20% 0 50% 0); }
            100% { transform: translate(0); }
        }

        #fight-announcement {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-family: 'Press Start 2P', cursive;
            color: #ff0000;
            font-size: 60px;
            z-index: 20001;
            text-shadow: 5px 5px #fff;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .intro-hide { opacity: 0; visibility: hidden; pointer-events: none; }

        nav {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 2px solid #ffeb3b;
            position: sticky; top: 0; z-index: 10000;
        }

        nav a { color: #ffeb3b; margin: 0 20px; text-decoration: none; font-size: 18px; }

        .box {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            padding: 25px; margin: 35px auto; width: 65%;
            border-radius: 12px; color: #ffeb3b;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .blood-footer {
            background: #ffffff; border-top: 3px solid #ff0000;
            padding: 40px 0; margin-top: 50px;
        }

        .badge-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .stop-spin { animation: none !important; transform: translateY(-180px) !important; }
    </style>
</head>

    <script>
        function startGame() {
            const dio = document.getElementById('dio-container');
            const intro = document.getElementById('game-intro');
            
            // Stop walk animation and start glitch
            dio.style.animation = 'none'; 
            void dio.offsetWidth; // Trigger reflow to apply glitch immediately
            dio.classList.add('glitch-out');
            
            document.getElementById('reel1').classList.add('stop-spin');
            document.getElementById('reel2').classList.add('stop-spin');
            document.getElementById('reel3').classList.add('stop-spin');

            setTimeout(() => {
                dio.style.opacity = '0';
            }, 700);

            setTimeout(() => {
                intro.classList.add('intro-hide');
                const fightText = document.getElementById('fight-announcement');
                setTimeout(() => {
                    fightText.style.transform = "translate(-50%, -50%) scale(1)";
                    setTimeout(() => { fightText.style.transform = "translate(-50%, -50%) scale(0)"; }, 1200);
                }, 400);
            }, 1000);
        }
    </script>
