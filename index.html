<style>
    body {
        font-family: Arial, sans-serif;
        /* Updated to a dark winter sky blue/grey to make snow visible */
        background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        color: #ffeb3b;
        text-align: center;
        padding: 0;
        margin: 0;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* Snow Animation Container */
    .snow-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Keeps snow behind your content */
        pointer-events: none;
        background: transparent;
    }

    .snowflake {
        position: absolute;
        top: -10px;
        color: white;
        user-select: none;
        z-index: -1;
        animation: fall linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(0); }
        100% { transform: translateY(110vh); }
    }

    /* Keep your existing animations and box styles below... */
    .sun {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, #fff176 20%, #ffeb3b 60%, #fbc02d 80%);
        border-radius: 50%;
        box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffeb3b;
        animation: sunPulse 4s ease-in-out infinite, sunRotate 20s linear infinite;
        z-index: 9998;
        pointer-events: none;
    }

    /* Rest of your CSS (nav, header, boxes, etc.) stays the same */
    nav {
        background: rgba(0, 0, 0, 0.8);
        padding: 15px 0;
        border-bottom: 2px solid #ffeb3b;
        box-shadow: 0 0 15px #ffeb3b;
        position: sticky;
        top: 0;
        z-index: 10000;
        backdrop-filter: blur(5px);
    }
    
    /* ... (Paste your remaining box and footer styles here) ... */
</style>

<body>
    <div class="snow-container" id="snow"></div>

    <script>
        // Snow Generation Script
        function createSnowflake() {
            const snowContent = ['❄', '❅', '❆', '•'];
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            snowflake.innerText = snowContent[Math.floor(Math.random() * snowContent.length)];
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's'; // 2-5 seconds
            snowflake.style.opacity = Math.random();
            snowflake.style.fontSize = (Math.random() * 10 + 10) + 'px';
            
            document.getElementById('snow').appendChild(snowflake);

            // Remove snowflake after it falls to keep DOM clean
            setTimeout(() => {
                snowflake.remove();
            }, 5000);
        }

        // Create a new flake every 100ms
        setInterval(createSnowflake, 100);
    </script>

    <div class="sun"></div>
    <nav>
        <a href="#">Home</a>
        <a href="#certs">Certifications</a>
        </nav>
    </body>
